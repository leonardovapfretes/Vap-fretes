<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>VapFretes - Frete Rápido</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1C1C1C">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><rect width='96' height='96' rx='22' fill='%23FF6B00'/><path d='M18 20 L38 72 L48 72 L58 72 L78 20 L64 20 L48 62 L32 20 Z' fill='white' opacity='.95'/></svg>">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --bg-dark: #1C1C1C;
    --bg-card: #2A2A2A;
    --border-card: #3A3A3A;
    --text-primary: #FFFFFF;
    --text-secondary: #B0B0B0;
    --brand: #FF6B00;
    --brand-dark: #E55A00;
    --success: #22C55E;
    --danger: #EF4444;
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 12px;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    overflow-x: hidden;
}

/* Loading */
.loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 16px;
}
.spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border-card);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Login */
#loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--bg-dark);
}
.login-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    border: 1px solid var(--border-card);
}
.login-logo {
    text-align: center;
    margin-bottom: 32px;
}
.login-title {
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    color: var(--brand);
    margin-bottom: 8px;
}
.login-sub {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 32px;
}
.login-err {
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
}

/* App Layout */
#appScreen {
    display: none;
    min-height: 100vh;
    position: relative;
}

/* Header Cliente */
.header-cliente {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 48px 16px 12px;
    background: linear-gradient(to bottom, rgba(28,28,28,0.95) 0%, rgba(28,28,28,0) 100%);
    pointer-events: none;
}
.header-cliente > * {
    pointer-events: auto;
}
.user-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.user-greeting {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
}
.user-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
}
.user-avatar {
    width: 44px;
    height: 44px;
    background: var(--brand);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
}
.user-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.user-avatar i {
    font-size: 22px;
    color: white;
}

/* Mapa Fullscreen */
.map-fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1;
}
#mapa-cliente {
    width: 100%;
    height: 100%;
}

/* Card de Endereços - Estilo Uber */
.address-card {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--bg-card);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 20px 20px 30px;
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease;
    border-top: 1px solid var(--border-card);
}
.address-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border-card);
    cursor: pointer;
}
.address-icon {
    width: 40px;
    height: 40px;
    background: var(--bg-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.address-icon i {
    font-size: 18px;
}
.address-icon.origin i {
    color: var(--brand);
}
.address-icon.destiny i {
    color: var(--success);
}
.address-content {
    flex: 1;
}
.address-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.address-value {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
}
.address-value.placeholder {
    color: var(--text-secondary);
    opacity: 0.6;
}

/* Valor Estimado */
.price-section {
    margin: 16px 0;
    text-align: center;
}
.price-label {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-bottom: 4px;
}
.price-value {
    font-size: 36px;
    font-weight: 800;
    color: var(--brand);
}
.price-value small {
    font-size: 16px;
    font-weight: 500;
}

/* Botão Solicitar */
.btn-request {
    width: 100%;
    padding: 16px;
    background: var(--brand);
    border: none;
    border-radius: var(--radius-md);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
}
.btn-request:active {
    transform: scale(0.97);
    background: var(--brand-dark);
}
.btn-request:disabled {
    opacity: 0.5;
    transform: none;
}

/* Autocomplete */
.autocomplete-container {
    position: relative;
}
.autocomplete-list {
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-sm);
    max-height: 200px;
    overflow-y: auto;
    z-index: 200;
    margin-bottom: 8px;
}
.autocomplete-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-card);
    font-size: 13px;
    transition: background 0.2s;
}
.autocomplete-item:active {
    background: var(--brand);
    color: white;
}
.autocomplete-item:last-child {
    border-bottom: none;
}

/* Modal Endereço */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
.modal-container {
    background: var(--bg-card);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px 20px 30px;
    border-top: 1px solid var(--border-card);
}
.modal-header {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
}
.modal-input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-dark);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    outline: none;
}
.modal-input:focus {
    border-color: var(--brand);
}
.modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}
.modal-btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    cursor: pointer;
    text-align: center;
}
.modal-btn-cancel {
    background: transparent;
    border: 1px solid var(--border-card);
    color: var(--text-secondary);
}
.modal-btn-confirm {
    background: var(--brand);
    border: none;
    color: white;
}

/* Bottom Navigation (para outras telas) */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-dark);
    border-top: 1px solid var(--border-card);
    display: flex;
    z-index: 100;
    padding: 8px 16px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
}
.nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    padding: 8px 4px;
    border-radius: var(--radius-sm);
}
.nav-btn i {
    font-size: 20px;
}
.nav-btn.active {
    color: var(--brand);
    background: rgba(255,107,0,0.1);
}

/* Seções */
.section {
    display: none;
    min-height: 100vh;
    padding-bottom: 80px;
}
.section.active {
    display: block;
}

/* Cards para outras telas */
.card {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 16px;
    margin: 12px 16px;
    border: 1px solid var(--border-card);
}
.card-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    margin-bottom: 12px;
}

/* Formulários */
.form-group {
    margin-bottom: 14px;
}
label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 6px;
}
input, select, textarea {
    width: 100%;
    background: var(--bg-dark);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
}
input:focus, select:focus, textarea:focus {
    border-color: var(--brand);
}

/* Botões */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    margin-bottom: 10px;
}
.btn-primary {
    background: var(--brand);
    color: white;
}
.btn-outline {
    background: transparent;
    border: 1px solid var(--border-card);
    color: var(--text-secondary);
}

/* Histórico */
.hist-card {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border-card);
}
.status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
}
.status-ganho { background: rgba(34,197,94,0.15); color: var(--success); }
.status-andamento { background: rgba(255,107,0,0.15); color: var(--brand); }
.status-pendente { background: rgba(245,158,11,0.15); color: #F59E0B; }
.status-perdido { background: rgba(239,68,68,0.15); color: var(--danger); }

/* Chat */
.chat-box {
    background: var(--bg-dark);
    border-radius: var(--radius-md);
    padding: 14px;
    min-height: 300px;
    max-height: 400px;
    overflow-y: auto;
}
.msg {
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
}
.msg-user {
    justify-content: flex-end;
}
.msg-user .msg-bubble {
    background: var(--brand);
    color: white;
    border-radius: 18px 4px 18px 18px;
}
.msg-other .msg-bubble {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 4px 18px 18px 18px;
}
.msg-bubble {
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 80%;
}
.msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.chat-input-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}
.chat-input-row input {
    flex: 1;
    margin: 0;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div style="color: var(--brand); font-weight: 700;">VAPFRETES</div>
</div>

<!-- Login -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">
            <svg width="50" height="50" viewBox="0 0 96 96">
                <rect width="96" height="96" rx="22" fill="#FF6B00"/>
                <path d="M18 20 L38 72 L48 72 L58 72 L78 20 L64 20 L48 62 L32 20 Z" fill="white" opacity="0.95"/>
            </svg>
        </div>
        <div class="login-title">VapFretes</div>
        <div class="login-sub">Sua carga, nossa prioridade</div>
        <div class="login-err" id="loginErr"></div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
        </div>
        <button class="btn" style="background: var(--brand); color: white;" onclick="fazerLogin()" id="btnLogin">ENTRAR</button>
        <button class="btn btn-outline" onclick="toggleCadastro()" id="btnToggle">Criar conta</button>
        <div id="cadastroExtra" style="display:none; margin-top:16px">
            <div class="form-group"><label>Nome completo</label><input type="text" id="loginNome" placeholder="Seu nome"></div>
            <div class="form-group"><label>WhatsApp</label><input type="tel" id="loginTel" placeholder="(11) 99999-9999"></div>
            <div class="form-group">
                <label>Tipo de conta</label>
                <select id="loginTipo">
                    <option value="cliente">Cliente</option>
                    <option value="motorista">Motorista</option>
                </select>
            </div>
        </div>
    </div>
</div>

<!-- App -->
<div id="appScreen">
    <!-- Tela Cliente (Home) -->
    <div class="section active" id="s-cliente-home">
        <div class="header-cliente">
            <div class="user-info">
                <div>
                    <div class="user-greeting">Olá,</div>
                    <div class="user-name" id="clienteNome">Cliente</div>
                </div>
                <div class="user-avatar" onclick="mostrarSecao('perfil')">
                    <img id="clienteAvatar" style="display:none">
                    <i class="fas fa-user" id="clienteAvatarIcon"></i>
                </div>
            </div>
        </div>

        <div class="map-fullscreen">
            <div id="mapa-cliente"></div>
        </div>

        <div class="address-card" id="addressCard">
            <div class="address-row" onclick="abrirModalEndereco('origem')">
                <div class="address-icon origin">
                    <i class="fas fa-circle"></i>
                </div>
                <div class="address-content">
                    <div class="address-label">ORIGEM</div>
                    <div class="address-value" id="origemDisplay">
                        <span class="placeholder">Onde está a carga?</span>
                    </div>
                </div>
            </div>

            <div class="address-row" onclick="abrirModalEndereco('destino')">
                <div class="address-icon destiny">
                    <i class="fas fa-flag-checkered"></i>
                </div>
                <div class="address-content">
                    <div class="address-label">DESTINO</div>
                    <div class="address-value" id="destinoDisplay">
                        <span class="placeholder">Para onde vai?</span>
                    </div>
                </div>
            </div>

            <div class="price-section" id="priceSection" style="display: none;">
                <div class="price-label">VALOR ESTIMADO</div>
                <div class="price-value" id="valorEstimado">R$ 0,00</div>
            </div>

            <button class="btn-request" id="solicitarBtn" onclick="solicitarFrete()" disabled>
                SOLICITAR FRETE
            </button>
        </div>
    </div>

    <!-- Tela Cliente - Histórico -->
    <div class="section" id="s-cliente-historico">
        <div class="card">
            <div class="card-title"><i class="fas fa-history"></i> Meus Pedidos</div>
            <div id="listaPedidos"></div>
        </div>
    </div>

    <!-- Tela Cliente - Chat -->
    <div class="section" id="s-cliente-chat">
        <div class="card">
            <div class="card-title"><i class="fas fa-comment-dots"></i> Central de Atendimento</div>
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')enviarMensagem()">
                <button class="btn-primary" onclick="enviarMensagem()" style="width: auto; padding: 12px 20px;">Enviar</button>
            </div>
        </div>
    </div>

    <!-- Tela Cliente - Perfil -->
    <div class="section" id="s-cliente-perfil">
        <div class="card text-center">
            <div class="user-avatar" style="width: 80px; height: 80px; margin: 0 auto 16px; cursor: pointer;" onclick="document.getElementById('perfilFotoInput').click()">
                <img id="perfilFoto" style="display:none">
                <i class="fas fa-user" id="perfilFotoIcon" style="font-size: 40px;"></i>
            </div>
            <input type="file" id="perfilFotoInput" accept="image/*" style="display:none" onchange="uploadFotoPerfil(this)">
            <div id="perfilNomeDisplay" style="font-size: 20px; font-weight: 700;"></div>
            <div id="perfilEmailDisplay" style="font-size: 13px; color: var(--text-secondary); margin: 4px 0;"></div>
        </div>
        <div class="card">
            <div class="card-title">Informações</div>
            <div class="form-group"><label>Nome completo</label><input type="text" id="perfilNomeInput"></div>
            <div class="form-group"><label>WhatsApp</label><input type="tel" id="perfilTelInput"></div>
            <button class="btn-primary" onclick="salvarPerfil()" style="background: var(--brand);">Salvar</button>
        </div>
        <div class="card">
            <button class="btn-outline" onclick="fazerLogout()" style="color: var(--danger); border-color: var(--danger);">Sair da conta</button>
        </div>
    </div>

    <!-- Bottom Navigation Cliente -->
    <div class="bottom-nav" id="bottomNavCliente">
        <button class="nav-btn active" onclick="mostrarSecaoCliente('home')">
            <i class="fas fa-home"></i>
            <span>Início</span>
        </button>
        <button class="nav-btn" onclick="mostrarSecaoCliente('historico')">
            <i class="fas fa-history"></i>
            <span>Pedidos</span>
        </button>
        <button class="nav-btn" onclick="mostrarSecaoCliente('chat')">
            <i class="fas fa-comment-dots"></i>
            <span>Chat</span>
        </button>
        <button class="nav-btn" onclick="mostrarSecaoCliente('perfil')">
            <i class="fas fa-user"></i>
            <span>Perfil</span>
        </button>
    </div>
</div>

<script>
// ============================================
// SUPABASE CONFIG
// ============================================
const SUPA_URL = 'https://atptmrycmvpocllqwgzo.supabase.co';
const SUPA_KEY = 'sb_publishable_aPK1_Jhh0hQQQbQ56UEwOw_wOEOjmQs';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// ============================================
// VARIÁVEIS GLOBAIS
// ============================================
let CU = null, CP = null;
let mapaObj = null;
let markerOrigem = null, markerDestino = null;
let enderecoOrigem = '', enderecoDestino = '';
let coordOrigem = null, coordDestino = null;
let distanciaAtual = 0;
let precoEstimado = 0;

// Preços por km
const precoPorKm = {
    'carro_carretinha': 2.10,
    'caminhonete': 2.50,
    'caminhao_pequeno': 3.80
};

const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjQ5ODQ2MDdjZGI0YzRhNDdhNDI0OTQ2NjQzZWQyNTQ3IiwiaCI6Im11cm11cjY0In0=';

// ============================================
// INICIALIZAÇÃO
// ============================================
async function init() {
    document.getElementById('loadingScreen').style.display = 'flex';
    
    const { data: { session } } = await db.auth.getSession();
    if (session) {
        await carregarPerfil(session.user);
    } else {
        mostrarLogin();
    }
    
    db.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) await carregarPerfil(session.user);
        if (event === 'SIGNED_OUT') { CP = null; CU = null; mostrarLogin(); }
    });
}

async function carregarPerfil(user) {
    CU = user;
    
    let { data: profile } = await db.from('profiles').select('*').eq('id', user.id).single();
    
    if (!profile) {
        await db.from('profiles').insert({
            id: user.id,
            email: user.email,
            nome: user.email.split('@')[0],
            role: 'cliente',
            plano: 'normal',
            aprovado: true
        });
        const { data } = await db.from('profiles').select('*').eq('id', user.id).single();
        profile = data;
    }
    
    CP = profile;
    
    document.getElementById('loadingScreen').style.display = 'none';
    mostrarApp();
}

function mostrarLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
}

function mostrarApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    
    // Carregar dados do cliente
    document.getElementById('clienteNome').textContent = CP.nome?.split(' ')[0] || 'Cliente';
    document.getElementById('perfilNomeDisplay').textContent = CP.nome || CP.email;
    document.getElementById('perfilEmailDisplay').textContent = CP.email;
    document.getElementById('perfilNomeInput').value = CP.nome || '';
    document.getElementById('perfilTelInput').value = CP.telefone || '';
    
    // Carregar foto
    const fotoSalva = localStorage.getItem(`foto_${CU.id}`);
    if (fotoSalva) {
        document.getElementById('clienteAvatar').src = fotoSalva;
        document.getElementById('clienteAvatar').style.display = 'block';
        document.getElementById('clienteAvatarIcon').style.display = 'none';
        document.getElementById('perfilFoto').src = fotoSalva;
        document.getElementById('perfilFoto').style.display = 'block';
        document.getElementById('perfilFotoIcon').style.display = 'none';
    }
    
    // Iniciar mapa
    setTimeout(() => iniciarMapaCliente(), 100);
    
    // Carregar pedidos
    carregarPedidos();
    carregarMensagens();
}

// ============================================
// LOGIN
// ============================================
let isCadastro = false;

function toggleCadastro() {
    isCadastro = !isCadastro;
    document.getElementById('cadastroExtra').style.display = isCadastro ? 'block' : 'none';
    document.getElementById('btnLogin').textContent = isCadastro ? 'CRIAR CONTA' : 'ENTRAR';
    document.getElementById('btnToggle').textContent = isCadastro ? 'Já tenho conta' : 'Criar conta';
}

async function fazerLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    const errDiv = document.getElementById('loginErr');
    
    if (!email || !senha) {
        errDiv.textContent = 'Preencha e-mail e senha!';
        errDiv.style.display = 'block';
        return;
    }
    
    errDiv.style.display = 'none';
    
    if (isCadastro) {
        const nome = document.getElementById('loginNome').value.trim() || email.split('@')[0];
        const tel = document.getElementById('loginTel').value.trim();
        const tipo = document.getElementById('loginTipo').value;
        
        const { data, error } = await db.auth.signUp({
            email, password: senha,
            options: { data: { nome } }
        });
        
        if (error) {
            errDiv.textContent = error.message;
            errDiv.style.display = 'block';
        } else {
            await db.from('profiles').upsert({
                id: data.user.id, email, nome, telefone: tel,
                role: tipo, tipo: tipo, plano: 'normal',
                aprovado: tipo === 'cliente'
            });
            errDiv.style.background = 'rgba(34,197,94,0.1)';
            errDiv.style.color = '#22C55E';
            errDiv.textContent = '✅ Conta criada! Faça login.';
            errDiv.style.display = 'block';
            isCadastro = false;
            toggleCadastro();
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    } else {
        const { error } = await db.auth.signInWithPassword({ email, password: senha });
        if (error) {
            errDiv.textContent = 'E-mail ou senha incorretos!';
            errDiv.style.display = 'block';
        }
    }
}

async function fazerLogout() {
    await db.auth.signOut();
}

// ============================================
// MAPA CLIENTE - ESTILO UBER
// ============================================
function iniciarMapaCliente() {
    if (mapaObj) mapaObj.remove();
    
    mapaObj = L.map('mapa-cliente').setView([-23.1794, -45.8869], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19
    }).addTo(mapaObj);
    
    // Centralizar na localização do usuário
    navigator.geolocation.getCurrentPosition(pos => {
        mapaObj.setView([pos.coords.latitude, pos.coords.longitude], 14);
        L.marker([pos.coords.latitude, pos.coords.longitude], {
            icon: L.divIcon({ html: '<i class="fas fa-location-dot" style="font-size:24px; color:#FF6B00;"></i>', iconSize: [24, 24] })
        }).addTo(mapaObj).bindPopup('Você está aqui');
    }, () => {
        mapaObj.setView([-23.1794, -45.8869], 13);
    });
}

// ============================================
// MODAL ENDEREÇO COM AUTOCOMPLETE
// ============================================
let modalTipo = 'origem';
let timeoutAutocomplete = null;

function abrirModalEndereco(tipo) {
    modalTipo = tipo;
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'enderecoModal';
    modal.innerHTML = `
        <div class="modal-container">
            <div class="modal-header">${tipo === 'origem' ? '📍 Onde está a carga?' : '🏁 Para onde vai?'}</div>
            <div class="autocomplete-container">
                <input type="text" id="modalEnderecoInput" class="modal-input" placeholder="Digite o endereço..." autocomplete="off">
                <div id="modalAutocompleteList" class="autocomplete-list" style="display: none;"></div>
            </div>
            <div class="modal-buttons">
                <div class="modal-btn modal-btn-cancel" onclick="fecharModal()">Cancelar</div>
                <div class="modal-btn modal-btn-confirm" onclick="confirmarEndereco()">Confirmar</div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    
    const input = document.getElementById('modalEnderecoInput');
    input.focus();
    input.addEventListener('input', () => buscarAutocomplete(input.value));
}

function fecharModal() {
    const modal = document.getElementById('enderecoModal');
    if (modal) modal.remove();
}

async function buscarAutocomplete(query) {
    const listaDiv = document.getElementById('modalAutocompleteList');
    if (!listaDiv) return;
    
    if (query.length < 3) {
        listaDiv.style.display = 'none';
        return;
    }
    
    if (timeoutAutocomplete) clearTimeout(timeoutAutocomplete);
    
    timeoutAutocomplete = setTimeout(async () => {
        try {
            const url = `https://api.openrouteservice.org/geocode/autocomplete?api_key=${ORS_KEY}&text=${encodeURIComponent(query)}&boundary.country=BR&size=5`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (!data.features?.length) {
                listaDiv.style.display = 'none';
                return;
            }
            
            listaDiv.innerHTML = data.features.map(f => `
                <div class="autocomplete-item" onclick="selecionarEndereco('${f.properties.label.replace(/'/g, "\\'")}', ${f.geometry.coordinates[0]}, ${f.geometry.coordinates[1]})">
                    <i class="fas fa-location-dot" style="margin-right: 8px; color: var(--brand);"></i>
                    ${f.properties.label}
                </div>
            `).join('');
            listaDiv.style.display = 'block';
        } catch(e) {
            listaDiv.style.display = 'none';
        }
    }, 400);
}

function selecionarEndereco(label, lng, lat) {
    const input = document.getElementById('modalEnderecoInput');
    if (input) input.value = label;
    
    window.enderecoSelecionado = { label, lng, lat };
    
    const listaDiv = document.getElementById('modalAutocompleteList');
    if (listaDiv) listaDiv.style.display = 'none';
}

function confirmarEndereco() {
    const input = document.getElementById('modalEnderecoInput');
    let endereco = input.value.trim();
    let coords = null;
    
    if (window.enderecoSelecionado) {
        endereco = window.enderecoSelecionado.label;
        coords = { lng: window.enderecoSelecionado.lng, lat: window.enderecoSelecionado.lat };
        window.enderecoSelecionado = null;
    }
    
    if (!endereco) {
        alert('Digite um endereço válido');
        return;
    }
    
    if (modalTipo === 'origem') {
        enderecoOrigem = endereco;
        document.getElementById('origemDisplay').innerHTML = `<span style="font-weight: 500;">${endereco.length > 40 ? endereco.substring(0,40)+'...' : endereco}</span>`;
        coordOrigem = coords;
    } else {
        enderecoDestino = endereco;
        document.getElementById('destinoDisplay').innerHTML = `<span style="font-weight: 500;">${endereco.length > 40 ? endereco.substring(0,40)+'...' : endereco}</span>`;
        coordDestino = coords;
    }
    
    fecharModal();
    calcularPrecoEstimado();
}

// ============================================
// CÁLCULO DE PREÇO
// ============================================
async function calcularPrecoEstimado() {
    if (!enderecoOrigem || !enderecoDestino) {
        document.getElementById('priceSection').style.display = 'none';
        document.getElementById('solicitarBtn').disabled = true;
        return;
    }
    
    document.getElementById('priceSection').style.display = 'block';
    document.getElementById('valorEstimado').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    document.getElementById('solicitarBtn').disabled = true;
    
    try {
        let origemCoord = coordOrigem;
        let destinoCoord = coordDestino;
        
        if (!origemCoord) origemCoord = await geocodificar(enderecoOrigem);
        if (!destinoCoord) destinoCoord = await geocodificar(enderecoDestino);
        
        const url = `https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${origemCoord.lng},${origemCoord.lat}&end=${destinoCoord.lng},${destinoCoord.lat}`;
        const resp = await fetch(url);
        const data = await resp.json();
        
        const km = data.features[0].properties.segments[0].distance / 1000;
        distanciaAtual = km;
        
        // Cálculo do preço
        const veiculoPadrao = 'carro_carretinha';
        const valorKm = precoPorKm[veiculoPadrao];
        let total = km * valorKm;
        total += 30; // Taxa base
        total = Math.max(total, 60);
        total = Math.ceil(total / 5) * 5;
        precoEstimado = total;
        
        document.getElementById('valorEstimado').innerHTML = `R$ ${total.toFixed(2)}`;
        document.getElementById('solicitarBtn').disabled = false;
        
        // Desenhar rota no mapa
        desenharRota(origemCoord, destinoCoord);
        
        // Adicionar marcadores
        if (markerOrigem) markerOrigem.remove();
        if (markerDestino) markerDestino.remove();
        
        markerOrigem = L.marker([origemCoord.lat, origemCoord.lng], {
            icon: L.divIcon({ html: '<i class="fas fa-circle" style="font-size:20px; color:#FF6B00;"></i>', iconSize: [20, 20] })
        }).addTo(mapaObj).bindPopup('Origem');
        
        markerDestino = L.marker([destinoCoord.lat, destinoCoord.lng], {
            icon: L.divIcon({ html: '<i class="fas fa-flag-checkered" style="font-size:20px; color:#22C55E;"></i>', iconSize: [20, 20] })
        }).addTo(mapaObj).bindPopup('Destino');
        
        // Ajustar zoom para mostrar rota completa
        const bounds = L.latLngBounds([origemCoord.lat, origemCoord.lng], [destinoCoord.lat, destinoCoord.lng]);
        mapaObj.fitBounds(bounds, { padding: [50, 50] });
        
    } catch(e) {
        console.error('Erro ao calcular:', e);
        document.getElementById('valorEstimado').innerHTML = 'R$ --';
        document.getElementById('solicitarBtn').disabled = true;
    }
}

async function geocodificar(endereco) {
    const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(endereco + ', Brasil')}&size=1`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.features?.length) throw new Error('Endereço não encontrado');
    return {
        lng: data.features[0].geometry.coordinates[0],
        lat: data.features[0].geometry.coordinates[1]
    };
}

function desenharRota(origem, destino) {
    if (mapaObj._rotaLinha) mapaObj.removeLayer(mapaObj._rotaLinha);
    
    const url = `https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${origem.lng},${origem.lat}&end=${destino.lng},${destino.lat}`;
    fetch(url)
        .then(res => res.json())
        .then(data => {
            const coords = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
            mapaObj._rotaLinha = L.polyline(coords, { color: '#FF6B00', weight: 4, opacity: 0.8 }).addTo(mapaObj);
        })
        .catch(console.error);
}

// ============================================
// SOLICITAR FRETE
// ============================================
async function solicitarFrete() {
    if (!enderecoOrigem || !enderecoDestino || precoEstimado <= 0) {
        alert('Preencha origem e destino primeiro!');
        return;
    }
    
    const btn = document.getElementById('solicitarBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
    btn.disabled = true;
    
    try {
        const rota = `${enderecoOrigem} → ${enderecoDestino}`;
        
        const { data: tratativa } = await db.from('tratativas').insert({
            cliente_id: CU.id,
            cliente: CP.nome || 'Cliente',
            tipo: 'frete',
            valor: precoEstimado,
            descricao: rota,
            status: 'pendente',
            mes_ano: new Date().toISOString().slice(0,7),
            veiculo_tipo: 'carro_carretinha'
        }).select().single();
        
        // Notificar gerentes
        const { data: gerentes } = await db.from('profiles').select('id').in('role', ['gerente', 'admin']);
        for (const g of gerentes || []) {
            await db.from('mensagens').insert({
                tratativa_id: tratativa.id,
                remetente_id: CU.id,
                texto: `📦 Novo pedido de ${CP.nome}: R$ ${precoEstimado.toFixed(2)} - ${rota}`,
                lida: false
            });
        }
        
        alert('✅ Pedido enviado! Um gerente irá atribuir um motorista em breve.');
        
        // Resetar campos
        enderecoOrigem = '';
        enderecoDestino = '';
        coordOrigem = null;
        coordDestino = null;
        document.getElementById('origemDisplay').innerHTML = '<span class="placeholder">Onde está a carga?</span>';
        document.getElementById('destinoDisplay').innerHTML = '<span class="placeholder">Para onde vai?</span>';
        document.getElementById('priceSection').style.display = 'none';
        document.getElementById('solicitarBtn').disabled = true;
        
        // Remover marcadores
        if (markerOrigem) markerOrigem.remove();
        if (markerDestino) markerDestino.remove();
        if (mapaObj._rotaLinha) mapaObj.removeLayer(mapaObj._rotaLinha);
        
        // Carregar pedidos atualizados
        carregarPedidos();
        
    } catch(e) {
        alert('Erro ao enviar pedido: ' + e.message);
    } finally {
        btn.innerHTML = 'SOLICITAR FRETE';
        btn.disabled = false;
    }
}

// ============================================
// PEDIDOS DO CLIENTE
// ============================================
async function carregarPedidos() {
    const { data: pedidos } = await db.from('tratativas')
        .select('*')
        .eq('cliente_id', CU.id)
        .order('created_at', { ascending: false });
    
    const listaDiv = document.getElementById('listaPedidos');
    if (!pedidos?.length) {
        listaDiv.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">Nenhum pedido ainda</div>';
        return;
    }
    
    const statusMap = {
        'ganho': { class: 'status-ganho', text: 'Concluído', icon: 'fa-check-circle' },
        'andamento': { class: 'status-andamento', text: 'Em andamento', icon: 'fa-truck' },
        'pendente': { class: 'status-pendente', text: 'Aguardando', icon: 'fa-clock' },
        'perdido': { class: 'status-perdido', text: 'Cancelado', icon: 'fa-ban' }
    };
    
    listaDiv.innerHTML = pedidos.map(p => {
        const status = statusMap[p.status] || statusMap.pendente;
        const podeCancelar = p.status === 'pendente';
        return `
            <div class="hist-card">
                <div class="flex-between" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <div>
                        <i class="fas ${status.icon}" style="color: ${status.class === 'status-andamento' ? '#FF6B00' : '#22C55E'}"></i>
                        <span class="status-badge ${status.class}" style="margin-left: 8px;">${status.text}</span>
                    </div>
                    <span style="font-size: 18px; font-weight: 700; color: var(--brand);">R$ ${(p.valor || 0).toFixed(2)}</span>
                </div>
                <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                    <i class="fas fa-route"></i> ${p.descricao || '—'}
                </div>
                <div class="flex-between" style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 11px; color: var(--text-tertiary);">
                        <i class="fas fa-calendar"></i> ${new Date(p.created_at).toLocaleDateString('pt-BR')}
                    </span>
                    ${podeCancelar ? `
                        <button class="btn-outline" onclick="cancelarPedido('${p.id}')" style="padding: 6px 12px; font-size: 12px; margin: 0; color: var(--danger); border-color: var(--danger);">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    ` : ''}
                </div>
            </div>
        `;
    }).join('');
}

async function cancelarPedido(tratId) {
    if (!confirm('Tem certeza que deseja cancelar este pedido?')) return;
    
    await db.from('tratativas').update({ status: 'perdido' }).eq('id', tratId);
    alert('✅ Pedido cancelado!');
    carregarPedidos();
}

// ============================================
// CHAT
// ============================================
async function carregarMensagens() {
    const { data: mensagens } = await db.from('mensagens_geral')
        .select('*')
        .order('created_at', { ascending: true })
        .limit(50);
    
    const chatDiv = document.getElementById('chatBox');
    if (!chatDiv) return;
    
    chatDiv.innerHTML = '';
    for (const m of mensagens || []) {
        const isUser = m.remetente_id === CU.id;
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isUser ? 'msg-user' : 'msg-other'}`;
        msgDiv.innerHTML = `
            ${!isUser ? `<div class="msg-avatar"><i class="fas fa-headset"></i></div>` : ''}
            <div class="msg-bubble">${m.texto}</div>
        `;
        chatDiv.appendChild(msgDiv);
    }
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function enviarMensagem() {
    const input = document.getElementById('chatInput');
    const texto = input.value.trim();
    if (!texto) return;
    input.value = '';
    
    await db.from('mensagens_geral').insert({
        remetente_id: CU.id,
        remetente_nome: CP.nome || 'Cliente',
        texto: texto,
        lida: false
    });
    
    carregarMensagens();
}

// ============================================
// PERFIL
// ============================================
function uploadFotoPerfil(input) {
    const file = input.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = e => {
        const fotoData = e.target.result;
        localStorage.setItem(`foto_${CU.id}`, fotoData);
        
        document.getElementById('clienteAvatar').src = fotoData;
        document.getElementById('clienteAvatar').style.display = 'block';
        document.getElementById('clienteAvatarIcon').style.display = 'none';
        document.getElementById('perfilFoto').src = fotoData;
        document.getElementById('perfilFoto').style.display = 'block';
        document.getElementById('perfilFotoIcon').style.display = 'none';
        
        alert('✅ Foto atualizada!');
    };
    reader.readAsDataURL(file);
}

async function salvarPerfil() {
    const nome = document.getElementById('perfilNomeInput').value.trim();
    const telefone = document.getElementById('perfilTelInput').value.trim();
    
    if (!nome) {
        alert('Informe seu nome!');
        return;
    }
    
    await db.from('profiles').update({ nome, telefone }).eq('id', CU.id);
    CP.nome = nome;
    CP.telefone = telefone;
    
    document.getElementById('clienteNome').textContent = nome.split(' ')[0];
    document.getElementById('perfilNomeDisplay').textContent = nome;
    
    alert('✅ Perfil atualizado!');
}

// ============================================
// NAVEGAÇÃO CLIENTE
// ============================================
function mostrarSecaoCliente(secao) {
    document.querySelectorAll('#appScreen .section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(`s-cliente-${secao}`).classList.add('active');
    event?.target?.closest('.nav-btn')?.classList.add('active');
    
    if (secao === 'home') {
        setTimeout(() => {
            if (mapaObj) mapaObj.invalidateSize();
        }, 100);
    }
    if (secao === 'historico') carregarPedidos();
    if (secao === 'chat') carregarMensagens();
}

init();
