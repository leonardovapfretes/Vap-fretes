<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VapFretes</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VapFretes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><rect width='96' height='96' rx='22' fill='%23ff6b00'/><path d='M18 20 L38 72 L48 72 L58 72 L78 20 L64 20 L48 62 L32 20 Z' fill='white' opacity='.95'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

<style>
/* ===== DESIGN SYSTEM REFATORADO ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --bg-primary: #ffffff;
    --bg-secondary: #f8f9fa;
    --bg-tertiary: #f1f3f5;
    --surface: #ffffff;
    --surface-hover: #f8f9fa;
    --border: #e9ecef;
    --border-dark: #dee2e6;
    --text-primary: #212529;
    --text-secondary: #6c757d;
    --text-muted: #adb5bd;
    --brand: #ff6b00;
    --brand-dark: #e55a00;
    --brand-light: #fff4e6;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}

/* Loading */
.loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.spinner {
    width: 44px;
    height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Login */
#loginScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
}

.login-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
}

.login-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text-primary);
}

/* App Layout */
#appScreen {
    display: none;
    padding-bottom: 72px;
    min-height: 100vh;
}

header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.95);
}

.logo {
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--brand);
}

.logo span {
    color: var(--text-primary);
}

.user-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 40px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
}

.logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
}

.logout-btn:active {
    background: var(--bg-tertiary);
}

/* Bottom Navigation */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.95);
}

.nav-btn {
    flex: 1;
    padding: 10px 4px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    transition: color 0.2s;
}

.nav-btn.active {
    color: var(--brand);
}

.nav-icon {
    font-size: 20px;
    line-height: 1;
}

/* Cards */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
}

.card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
}

.btn:active {
    transform: scale(0.98);
}

.btn-primary {
    background: var(--brand);
    color: white;
}

.btn-primary:active {
    background: var(--brand-dark);
}

.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
}

.btn-success {
    background: var(--success);
    color: white;
}

.btn-danger {
    background: var(--danger);
    color: white;
}

.btn-sm {
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    transition: all 0.2s;
}

/* Form elements */
.form-group {
    margin-bottom: 14px;
}

label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 6px;
}

input, select, textarea {
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
}

input:focus, select:focus, textarea:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
}

/* Map Styles */
#mapa {
    height: calc(100vh - 80px);
    width: 100%;
    background: #e8eaed;
}

.leaflet-popup-content-wrapper {
    border-radius: var(--radius-md) !important;
    box-shadow: var(--shadow-lg) !important;
}

/* Modal */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.modal-container {
    background: var(--surface);
    border-radius: var(--radius-lg);
    max-width: 400px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    animation: modalFadeIn 0.3s ease;
}

@keyframes modalFadeIn {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Chat */
.chat-box {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 14px;
    min-height: 300px;
    max-height: 400px;
    overflow-y: auto;
}

.msg {
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
}

.msg-user {
    justify-content: flex-end;
}

.msg-user .msg-bubble {
    background: var(--brand);
    color: white;
    border-radius: 18px 4px 18px 18px;
}

.msg-other .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
}

.msg-bubble {
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 80%;
}

.msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--brand-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
}

.msg-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Status buttons */
.status-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
}

.status-buttons .btn-sm {
    flex: 1;
    min-width: calc(50% - 4px);
}

/* Misc */
.banner {
    background: var(--brand-light);
    border-left: 3px solid var(--brand);
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    font-size: 13px;
}

.section {
    display: none;
    animation: fadeIn 0.2s ease;
}

.section.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Utility */
.text-center { text-align: center; }
.text-brand { color: var(--brand); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.gap-2 { gap: 8px; }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
</div>

<div id="loginScreen">
    <div class="login-card">
        <div class="login-title" id="loginTitulo">Entrar</div>
        <div id="loginErr" style="display:none; background:#fee2e2; color:#ef4444; padding:10px; border-radius:8px; margin-bottom:16px; font-size:13px"></div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
        </div>
        <button class="btn btn-primary" onclick="fazerLogin()" id="btnLogin">ENTRAR</button>
        <button class="btn btn-outline" onclick="toggleCadastro()" id="btnToggle">Criar conta</button>
        <div id="cadastroExtra" style="display:none; margin-top:16px">
            <div class="form-group"><label>Nome completo</label><input type="text" id="loginNome" placeholder="Seu nome"></div>
            <div class="form-group"><label>WhatsApp</label><input type="tel" id="loginTel" placeholder="(11) 99999-9999"></div>
            <div class="form-group">
                <label>Tipo de conta</label>
                <select id="loginTipo">
                    <option value="cliente">Cliente</option>
                    <option value="motorista">Motorista</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div id="appScreen">
    <header>
        <div class="logo">VAP<span>FRETES</span></div>
        <div style="display:flex; gap:8px; align-items:center">
            <span class="user-badge" id="userBadge"></span>
            <button class="logout-btn" onclick="fazerLogout()">Sair</button>
        </div>
    </header>

    <main>
        <!-- Dashboard (conteúdo dinâmico) -->
        <div class="section active" id="s-dashboard"></div>

        <!-- Calcular (Motorista/Gerente) -->
        <div class="section" id="s-calcular">
            <div class="card">
                <div class="card-title">📦 Tipo de veículo</div>
                <select id="veiculoTipo" class="mb-3">
                    <option value="carro_carretinha">🚗 Carro + Carretinha (R$ 2,10/km)</option>
                    <option value="caminhonete">🚙 Caminhonete (R$ 2,50/km)</option>
                    <option value="caminhao_pequeno">🚚 Caminhão Pequeno (R$ 3,80/km)</option>
                </select>
                
                <div class="card-title">📍 Rota</div>
                <div class="form-group"><label>Ponto A (Origem)</label><input type="text" id="pontoA" placeholder="Rua, número, bairro, cidade"></div>
                <div class="form-group"><label>Ponto B (Destino)</label><input type="text" id="pontoB" placeholder="Rua, número, bairro, cidade"></div>
                <div class="form-group"><label>Ponto C (opcional)</label><input type="text" id="pontoC" placeholder="Parada intermediária"></div>
                <button class="btn btn-outline" id="btnDist" onclick="calcularDistancia()">📍 Calcular distância</button>
                <div id="rota-res" style="display:none; background:var(--bg-secondary); border-radius:8px; padding:12px; margin:12px 0; font-size:13px"></div>
                
                <div class="row2" style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <div class="form-group"><label>Distância (km)</label><input type="number" id="kmTotal" placeholder="0"></div>
                    <div class="form-group"><label>Tipo de carga</label>
                        <select id="tipoCarga">
                            <option value="leve">📦 Carga Leve</option>
                            <option value="pesada">🏋️ Carga Pesada (+40%)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group"><label>Andares com escada</label><input type="number" id="qtdAndares" value="0" placeholder="0"></div>
                <div class="form-group"><label>Destino em área serrana?</label>
                    <select id="areaSerrana">
                        <option value="0">Não</option>
                        <option value="1">Sim (Campos do Jordão, S.F. Xavier) +15%</option>
                    </select>
                </div>
                <div class="form-group"><label>Observações</label><textarea id="obsOrc" placeholder="Ex: montagem, carga frágil..."></textarea></div>
            </div>
            <button class="btn btn-primary" onclick="calcularPreco()">💰 GERAR ORÇAMENTO</button>
            <div id="resultado" style="display:none; margin-top:12px"></div>
        </div>

        <!-- Histórico -->
        <div class="section" id="s-historico">
            <div id="sec-atrib" style="display:none">
                <div class="card-title" style="color:var(--brand)">📦 Fretes para aceitar</div>
                <div id="lista-atrib"></div>
            </div>
            <div id="sec-andando" style="display:none">
                <div class="card-title">🔄 Em andamento</div>
                <div id="lista-andando"></div>
            </div>
            <div class="card-title">📋 Histórico completo</div>
            <div id="lista-hist"></div>
        </div>

        <!-- Mapa -->
        <div class="section" id="s-mapa">
            <div id="mapa"></div>
            <div id="mapa-botoes" style="position:fixed; bottom:80px; right:16px; z-index:500; display:flex; flex-direction:column; gap:8px">
                <button onclick="centralizarMapa()" class="btn-sm" style="background:white; box-shadow:var(--shadow-md); padding:12px; border-radius:40px">📍 Recentralizar</button>
            </div>
            <div id="mapa-status-buttons" style="display:none; position:fixed; bottom:80px; left:16px; right:16px; z-index:500; background:white; border-radius:16px; padding:12px; box-shadow:var(--shadow-lg)">
                <div class="card-title">Status da entrega</div>
                <div class="status-buttons">
                    <button class="btn-sm" onclick="atualizarStatus('coleta_realizada')">✅ Coleta realizada</button>
                    <button class="btn-sm btn-success" onclick="atualizarStatus('entrega_concluida')">🏁 Entrega concluída</button>
                    <button class="btn-sm btn-danger" onclick="mostrarJustificativa('nao_coletado')">⚠️ Não foi possível coletar</button>
                    <button class="btn-sm btn-outline" onclick="mostrarJustificativa('cancelado')">❌ Cancelar entrega</button>
                </div>
            </div>
        </div>

        <!-- Chat -->
        <div class="section" id="s-chat">
            <div class="card">
                <div class="card-title" id="chat-titulo">💬 Chat</div>
                <div class="chat-box" id="chatServico"></div>
                <div class="flex gap-2" style="margin-top:12px">
                    <input type="text" id="chatServInput" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter')enviarMsgServ()" style="flex:1">
                    <button class="btn-sm" onclick="enviarMsgServ()">Enviar</button>
                </div>
            </div>
        </div>

        <!-- Perfil -->
        <div class="section" id="s-eu">
            <div class="card text-center">
                <div id="perfil-nome-display" style="font-size:20px; font-weight:700"></div>
                <div id="perfil-email-display" style="font-size:13px; color:var(--text-secondary); margin:4px 0"></div>
                <div id="perfil-badge-display" class="user-badge" style="display:inline-block; margin:8px 0"></div>

                <div class="card-title">Editar perfil</div>
                <div class="form-group"><label>Nome</label><input type="text" id="perfil-nome-input"></div>
                <div class="form-group"><label>WhatsApp</label><input type="tel" id="perfil-tel-input"></div>
                <button class="btn btn-primary" onclick="salvarPerfil()">Salvar</button>

            <div class="card">
                <button class="btn btn-outline" onclick="fazerLogout()">Sair da conta</button>
            </div>
        </div>

        <!-- Equipe (Gerente) -->
        <div class="section" id="s-equipe">
            <div id="sec-aprovacao" style="display:none">
                <div class="card-title">⏳ Motoristas pendentes</div>
                <div id="lista-aprovacao"></div>
            </div>
            <div class="card">
                <div class="card-title">👥 Motoristas ativos</div>
                <div id="lista-usuarios"></div>
            </div>
            <div class="card">
                <div class="card-title">📢 Publicar aviso</div>
                <div class="form-group"><input type="text" id="aviso-titulo" placeholder="Título"></div>
                <div class="form-group"><textarea id="aviso-msg" placeholder="Mensagem"></textarea></div>
                <button class="btn btn-primary" onclick="publicarAviso()">Publicar</button>
            </div>
        </div>
    </main>

    <div class="bottom-nav" id="bottomNav"></div>
</div>

<script>
// ===== SUPABASE =====
const SUPA_URL = 'https://atptmrycmvpocllqwgzo.supabase.co';
const SUPA_KEY = 'sb_publishable_aPK1_Jhh0hQQQbQ56UEwOw_wOEOjmQs';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// ===== VARIÁVEIS GLOBAIS =====
let CU = null, CP = null;
let mapaObj = null, marcadorMot = null, marcadorCli = null, trackingInterval = null;
let tratativaAtiva = null;
let orcamentoAtual = null;

// ===== PREÇOS POR VEÍCULO =====
const precoPorKm = {
    'carro_carretinha': 2.10,
    'caminhonete': 2.50,
    'caminhao_pequeno': 3.80
};

// ===== INICIALIZAÇÃO =====
async function init() {
    document.getElementById('loadingScreen').style.display = 'flex';
    const { data: { session } } = await db.auth.getSession();
    if (session) await carregarPerfil(session.user);
    else mostrarLogin();
    
    db.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) await carregarPerfil(session.user);
        if (event === 'SIGNED_OUT') { CP = null; CU = null; mostrarLogin(); }
    });
}

async function carregarPerfil(user) {
    CU = user;
    let { data: profile } = await db.from('profiles').select('*').eq('id', user.id).single();
    if (!profile) {
        await db.from('profiles').insert({ id: user.id, email: user.email, nome: user.email.split('@')[0], role: 'motorista', plano: 'normal', aprovado: true });
        const { data } = await db.from('profiles').select('*').eq('id', user.id).single();
        profile = data;
    }
    CP = profile;
    document.getElementById('loadingScreen').style.display = 'none';
    mostrarApp();
}

function mostrarLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('loadingScreen').style.display = 'none';
}

function mostrarApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    configurarUI();
    carregarDash();
    iniciarPolling();
}

// ===== LOGIN =====
let isCadastro = false;
function toggleCadastro() {
    isCadastro = !isCadastro;
    document.getElementById('cadastroExtra').style.display = isCadastro ? 'block' : 'none';
    document.getElementById('btnLogin').textContent = isCadastro ? 'CRIAR CONTA' : 'ENTRAR';
    document.getElementById('btnToggle').textContent = isCadastro ? 'Já tenho conta' : 'Criar conta';
    document.getElementById('loginTitulo').textContent = isCadastro ? 'Criar conta' : 'Entrar';
}

async function fazerLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    const errDiv = document.getElementById('loginErr');
    
    if (!email || !senha) {
        errDiv.textContent = 'Preencha e-mail e senha!';
        errDiv.style.display = 'block';
        return;
    }
    
    if (isCadastro) {
        const nome = document.getElementById('loginNome').value.trim() || email.split('@')[0];
        const tel = document.getElementById('loginTel').value.trim();
        const tipo = document.getElementById('loginTipo').value;
        
        const { data, error } = await db.auth.signUp({ 
            email, password: senha, 
            options: { data: { nome } } 
        });
        
        if (error) {
            errDiv.textContent = error.message;
            errDiv.style.display = 'block';
        } else {
            await db.from('profiles').upsert({ 
                id: data.user.id, email, nome, telefone: tel, 
                role: tipo, tipo: tipo, plano: 'normal', 
                aprovado: tipo === 'cliente' 
            });
            errDiv.style.background = '#dcfce7';
            errDiv.style.color = '#166534';
            errDiv.textContent = tipo === 'cliente' ? '✅ Conta criada! Faça login.' : '✅ Cadastro enviado! Aguarde aprovação.';
            errDiv.style.display = 'block';
            isCadastro = false;
            toggleCadastro();
        }
    } else {
        const { error } = await db.auth.signInWithPassword({ email, password: senha });
        if (error) {
            errDiv.textContent = 'E-mail ou senha incorretos!';
            errDiv.style.display = 'block';
        }
    }
}

function calcularPreco() {

        mostrarTermoResponsabilidade(() => executarCalculo());
    } else {
        executarCalculo();
    }
}

function executarCalculo() {
    const km = parseFloat(document.getElementById('kmTotal').value) || 0;
    if (km <= 0) {
        alert('Informe a distância! Use o botão "Calcular distância"');
        return;
    }
    
    const veiculo = document.getElementById('veiculoTipo').value;
    const valorKm = precoPorKm[veiculo];
    const tipoCarga = document.getElementById('tipoCarga').value;
    const andares = parseInt(document.getElementById('qtdAndares').value) || 0;
    const areaSerrana = parseInt(document.getElementById('areaSerrana').value) || 0;
    
    let total = km * valorKm;
    
    // Taxa base de serviço (mínimo R$ 30)
    let taxaServico = 30;
    if (tipoCarga === 'pesada') taxaServico *= 1.4;
    total += taxaServico;
    
    // Adicional por andar
    total += andares * 25;
    
    // Fator serra
    if (areaSerrana === 1) total *= 1.15;
    
    // Valor mínimo
    total = Math.max(total, 60);
    
    // Arredondar para cima (5 em 5)
    total = Math.ceil(total / 5) * 5;
    
    const rota = `${document.getElementById('pontoA').value} → ${document.getElementById('pontoB').value}`;
    const obs = document.getElementById('obsOrc').value;
    
    orcamentoAtual = { total, km, rota, obs, veiculo, tipoCarga, andares, areaSerrana };
    
    const resultadoDiv = document.getElementById('resultado');
    resultadoDiv.style.display = 'block';
    resultadoDiv.innerHTML = `
        <div class="card">
            <div class="card-title">💰 Orçamento</div>
            <div class="flex-between mb-2"><span>📍 Distância</span><span class="text-brand">${km} km</span></div>
            <div class="flex-between mb-2"><span>🚗 Valor por km</span><span>R$ ${valorKm.toFixed(2)}</span></div>
            <div class="flex-between mb-2"><span>📦 Taxa de serviço</span><span>R$ ${taxaServico.toFixed(2)}</span></div>
            ${andares > 0 ? `<div class="flex-between mb-2"><span>🪜 ${andares} andar(es)</span><span>R$ ${(andares*25).toFixed(2)}</span></div>` : ''}
            ${areaSerrana ? `<div class="flex-between mb-2"><span>⛰️ Fator serra</span><span>+15%</span></div>` : ''}
            <div class="flex-between" style="border-top:1px solid var(--border); padding-top:12px; margin-top:8px">
                <span style="font-weight:700">TOTAL</span>
                <span style="font-size:24px; font-weight:800; color:var(--brand)">R$ ${total.toFixed(2)}</span>
            </div>
            <button class="btn btn-primary" style="margin-top:16px" onclick="confirmarOrcamento()">✅ Confirmar orçamento</button>
            <button class="btn btn-outline" onclick="document.getElementById('resultado').style.display='none'">Voltar</button>
        </div>
    `;
}

    if (!orcamentoAtual) return;
    
    const { data: tratativa } = await db.from('tratativas').insert({

// ===== FUNÇÃO DE DISTÂNCIA (ORS) =====
const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjQ5ODQ2MDdjZGI0YzRhNDdhNDI0OTQ2NjQzZWQyNTQ3IiwiaCI6Im11cm11cjY0In0=';
let coordA = null, coordB = null;

async function calcularDistancia() {
    const pA = document.getElementById('pontoA').value.trim();
    const pB = document.getElementById('pontoB').value.trim();
    
    if (!pA || !pB) {
        alert('Preencha origem e destino!');
        return;
    }
    
    const btn = document.getElementById('btnDist');
    btn.textContent = '⏳ Calculando...';
    btn.disabled = true;
    
    try {
        const geoA = await geocodificar(pA);
        const geoB = await geocodificar(pB);
        
        const url = `https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${geoA[0]},${geoA[1]}&end=${geoB[0]},${geoB[1]}`;
        const resp = await fetch(url);
        const data = await resp.json();
        
        const km = data.features[0].properties.segments[0].distance / 1000;
        document.getElementById('kmTotal').value = km.toFixed(1);
        
        document.getElementById('rota-res').style.display = 'block';
        document.getElementById('rota-res').innerHTML = `
            <div class="flex-between">
                <span>📍 Distância calculada</span>
                <span class="text-brand" style="font-weight:700">${km.toFixed(1)} km</span>
            </div>
        `;
    } catch(e) {
        alert('Erro ao calcular distância. Verifique os endereços.');
    } finally {
        btn.textContent = '📍 Calcular distância';
        btn.disabled = false;
    }
}

async function geocodificar(endereco) {
    const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(endereco + ', Brasil')}&size=1`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.features?.length) throw new Error('Endereço não encontrado');
    return data.features[0].geometry.coordinates;
}

async function iniciarMapa() {
    if (mapaObj) mapaObj.remove();
    
    mapaObj = L.map('mapa').setView([-23.1794, -45.8869], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19
    }).addTo(mapaObj);
    
    const isMotorista = CP.role === 'motorista';
    const isCliente = CP.role === 'cliente';
    const isGerente = CP.role === 'gerente' || CP.role === 'admin';
    
    if (isMotorista) {
        document.getElementById('mapa-status-buttons').style.display = 'block';
        iniciarTrackingMotorista();
        carregarRotaAtiva();
        if (trackingInterval) clearInterval(trackingInterval);
        trackingInterval = setInterval(() => {
            carregarRotaAtiva();
        }, 10000);
    } else if (isCliente) {
        document.getElementById('mapa-status-buttons').style.display = 'none';
        centralizarMapa();
        carregarMotoristaCliente();
        if (trackingInterval) clearInterval(trackingInterval);
        trackingInterval = setInterval(carregarMotoristaCliente, 8000);
    } else if (isGerente) {
        document.getElementById('mapa-status-buttons').style.display = 'none';
        carregarTodosMotoristas();
        if (trackingInterval) clearInterval(trackingInterval);
        trackingInterval = setInterval(carregarTodosMotoristas, 15000);
    }
}

function centralizarMapa() {
    if (!mapaObj) return;
    navigator.geolocation.getCurrentPosition(pos => {
        mapaObj.setView([pos.coords.latitude, pos.coords.longitude], 15);
    }, () => {
        alert('Não foi possível obter sua localização');
    });
}

async function iniciarTrackingMotorista() {
    if (!navigator.geolocation) return;
    
    const enviarPosicao = () => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { data: tratativa } = await db.from('tratativas').select('id').eq('user_id', CU.id).eq('status', 'andamento').single();
            if (tratativa) {
                await db.from('localizacoes').upsert({
                    motorista_id: CU.id,
                    tratativa_id: tratativa.id,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    updated_at: new Date().toISOString()
                });
                
                if (marcadorMot) marcadorMot.setLatLng([pos.coords.latitude, pos.coords.longitude]);
                else marcadorMot = L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(mapaObj).bindPopup('Você');
                
                mapaObj.setView([pos.coords.latitude, pos.coords.longitude], 15);
            }
        }, () => {});
    };
    
    enviarPosicao();
    if (window.gpsInterval) clearInterval(window.gpsInterval);
    window.gpsInterval = setInterval(enviarPosicao, 5000);
}

async function carregarRotaAtiva() {
    const { data: tratativa } = await db.from('tratativas').select('*').eq('user_id', CU.id).eq('status', 'andamento').single();
    tratativaAtiva = tratativa?.id;
    
    if (tratativa && tratativa.descricao) {
        const pontos = tratativa.descricao.split('→').map(p => p.trim());
        if (pontos.length >= 2) {
            try {
                const coordDestino = await geocodificar(pontos[pontos.length - 1]);
                L.marker([coordDestino[1], coordDestino[0]], {
                    icon: L.divIcon({ html: '📍', iconSize: [24, 24] })
                }).addTo(mapaObj).bindPopup('Destino');
            } catch(e) {}
        }
    }
}

async function carregarMotoristaCliente() {
    const { data: tratativa } = await db.from('tratativas').select('user_id').eq('cliente_id', CU.id).eq('status', 'andamento').single();
    if (!tratativa) return;
    
    const { data: localizacao } = await db.from('localizacoes').select('*').eq('motorista_id', tratativa.user_id).single();
    if (localizacao) {
        if (marcadorMot) marcadorMot.setLatLng([localizacao.lat, localizacao.lng]);
        else marcadorMot = L.marker([localizacao.lat, localizacao.lng]).addTo(mapaObj).bindPopup('Motorista');
        mapaObj.setView([localizacao.lat, localizacao.lng], 14);
    }
}

async function carregarTodosMotoristas() {
    const { data: tratativas } = await db.from('tratativas').select('user_id').eq('status', 'andamento');
    const motoristasIds = [...new Set(tratativas?.map(t => t.user_id) || [])];
    
    for (const id of motoristasIds) {
        const { data: loc } = await db.from('localizacoes').select('*').eq('motorista_id', id).single();
        if (loc) {
            const marker = L.marker([loc.lat, loc.lng]).addTo(mapaObj);
            const { data: profile } = await db.from('profiles').select('nome').eq('id', id).single();
            marker.bindPopup(profile?.nome || 'Motorista');
        }
    }
}

// ===== STATUS DO MOTORISTA =====
async function atualizarStatus(novoStatus) {
    if (!tratativaAtiva) return;
    
    let observacao = '';
    if (novoStatus === 'nao_coletado' || novoStatus === 'cancelado') {
        observacao = prompt('Justificativa:');
        if (!observacao) return;
    }
    
    let statusFinal = novoStatus;
    if (novoStatus === 'entrega_concluida') statusFinal = 'ganho';
    if (novoStatus === 'nao_coletado') statusFinal = 'perdido';
    if (novoStatus === 'cancelado') statusFinal = 'perdido';
    
    await db.from('tratativas').update({ status: statusFinal }).eq('id', tratativaAtiva);
    
    await db.from('audit_logs').insert({
        tratativa_id: tratativaAtiva,
        status_anterior: 'andamento',
        status_novo: statusFinal,
        usuario_id: CU.id,
        observacao
    });
    
    alert(`✅ Status atualizado: ${novoStatus}`);
    if (statusFinal !== 'andamento') {
        document.getElementById('mapa-status-buttons').style.display = 'none';
        if (window.gpsInterval) clearInterval(window.gpsInterval);
        mostrarSecao('dashboard');
    }
}

function mostrarJustificativa(tipo) {
    atualizarStatus(tipo);
}

// ===== CHAT COM FOTO =====
let chatTratativaId = null;

async function abrirChat(tratativaId, clienteNome) {
    chatTratativaId = tratativaId;
    document.getElementById('chat-titulo').textContent = `💬 Chat - ${clienteNome || 'Cliente'}`;
    mostrarSecao('chat');
    
    const { data: mensagens } = await db.from('mensagens').select('*, profiles(nome, foto_url)').eq('tratativa_id', tratativaId).order('created_at', { ascending: true });
    
    const chatDiv = document.getElementById('chatServico');
    chatDiv.innerHTML = mensagens?.map(m => `
        <div class="msg ${m.remetente_id === CU.id ? 'msg-user' : 'msg-other'}">
            ${m.remetente_id !== CU.id ? `<div class="msg-avatar">${m.profiles?.foto_url ? `<img src="${m.profiles.foto_url}">` : '🚚'}</div>` : ''}
            <div class="msg-bubble">${m.texto}</div>
        </div>
    `).join('') || '';
    
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function enviarMsgServ() {
    const input = document.getElementById('chatServInput');
    const texto = input.value.trim();
    if (!texto || !chatTratativaId) return;
    input.value = '';
    
    await db.from('mensagens').insert({
        tratativa_id: chatTratativaId,
        remetente_id: CU.id,
        texto
    });
    
    // Adicionar localmente
    const chatDiv = document.getElementById('chatServico');
    chatDiv.innerHTML += `<div class="msg msg-user"><div class="msg-bubble">${texto}</div></div>`;
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

// ===== PERFIL =====
async function carregarPerfilUI() {
    document.getElementById('perfil-nome-display').textContent = CP.nome || CP.email;
    document.getElementById('perfil-email-display').textContent = CP.email;
    document.getElementById('perfil-badge-display').textContent = CP.role === 'cliente' ? '🛍️ Cliente' : (CP.role === 'gerente' ? '👑 Gerente' : '🚚 Motorista');
    document.getElementById('perfil-nome-input').value = CP.nome || '';
    document.getElementById('perfil-tel-input').value = CP.telefone || '';
}

async function salvarPerfil() {
    const nome = document.getElementById('perfil-nome-input').value.trim();
    const telefone = document.getElementById('perfil-tel-input').value.trim();
    
    await db.from('profiles').update({ nome, telefone }).eq('id', CU.id);
    CP.nome = nome;
    CP.telefone = telefone;
    alert('✅ Perfil atualizado!');
    carregarPerfilUI();
}

// ===== EQUIPE (GERENTE) =====
async function carregarEquipe() {
    const { data: motoristas } = await db.from('profiles').select('*').in('role', ['motorista', 'gerente', 'admin']);
    const pendentes = motoristas?.filter(m => m.aprovado === false) || [];
    const aprovados = motoristas?.filter(m => m.aprovado !== false) || [];
    
    const secAprovacao = document.getElementById('sec-aprovacao');
    if (pendentes.length) {
        secAprovacao.style.display = 'block';
        document.getElementById('lista-aprovacao').innerHTML = pendentes.map(m => `
            <div class="flex-between mb-2">
                <div><strong>${m.nome || m.email}</strong><br><span style="font-size:11px">${m.email}</span></div>
                <button class="btn-sm btn-success" onclick="aprovarMotorista('${m.id}')">Aprovar</button>
            </div>
        `).join('');
    } else {
        secAprovacao.style.display = 'none';
    }
    
    document.getElementById('lista-usuarios').innerHTML = aprovados.map(m => `
        <div class="flex-between mb-2">
            <div>
                <strong>${m.nome || m.email}</strong>
                <div style="font-size:11px; color:var(--text-muted)">${m.role}</div>
            </div>
            <button class="btn-sm" onclick="ligarMotorista('${m.telefone}')">📞 Ligar</button>
        </div>
    `).join('');
}

async function aprovarMotorista(id) {
    await db.from('profiles').update({ aprovado: true }).eq('id', id);
    alert('✅ Motorista aprovado!');
    carregarEquipe();
}

function ligarMotorista(telefone) {
    if (telefone) window.open(`tel:${telefone}`);
    else alert('Telefone não cadastrado');
}

async function publicarAviso() {
    const titulo = document.getElementById('aviso-titulo').value.trim();
    const msg = document.getElementById('aviso-msg').value.trim();
    if (!titulo || !msg) return;
    
    await db.from('avisos').insert({ titulo, mensagem: msg, ativo: true });
    alert('📢 Aviso publicado!');
    document.getElementById('aviso-titulo').value = '';
    document.getElementById('aviso-msg').value = '';
}

// ===== POLLING PARA NOTIFICAÇÕES =====
function iniciarPolling() {
    setInterval(async () => {
        if (CP.role === 'motorista') {
            const { count } = await db.from('atribuicoes').select('*', { count: 'exact', head: true }).eq('motorista_id', CU.id).eq('status', 'pendente');
            if (count > 0 && document.title !== '🔔 VapFretes') {
                document.title = `🔔 ${count} novo(s) frete(s)`;
                setTimeout(() => { document.title = 'VapFretes'; }, 5000);
            }
        }
        if ((CP.role === 'gerente' || CP.role === 'admin')) {
            const { count } = await db.from('tratativas').select('*', { count: 'exact', head: true }).eq('status', 'pendente').not('cliente_id', 'is', null);
            if (count > 0 && document.title !== '📦 VapFretes') {
                document.title = `📦 ${count} novo(s) pedido(s)`;
                setTimeout(() => { document.title = 'VapFretes'; }, 5000);
            }
        }
    }, 30000);
}

// ===== INICIAR =====
init();
